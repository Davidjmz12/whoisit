<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's That Pokémon?</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Generation Selection -->
    <div id="gen-select">
        <h1>Who's That Pokémon?</h1>
        <p class="subtitle">Select a generation to begin</p>
        <div class="gen-buttons">
            <button class="gen-btn" data-gen="1">Generation I<br><small>Kanto · #001–151</small></button>
            <button class="gen-btn" data-gen="2">Generation II<br><small>Johto · #152–251</small></button>
            <button class="gen-btn" data-gen="3">Generation III<br><small>Hoenn · #252–386</small></button>
            <button class="gen-btn" data-gen="4">Generation IV<br><small>Sinnoh · #387–493</small></button>
            <button class="gen-btn" data-gen="5">Generation V<br><small>Unova · #494–649</small></button>
            <button class="gen-btn" data-gen="6">Generation VI<br><small>Kalos · #650–721</small></button>
            <button class="gen-btn" data-gen="7">Generation VII<br><small>Alola · #722–809</small></button>
            <button class="gen-btn" data-gen="8">Generation VIII<br><small>Galar · #810–898</small></button>
        </div>
    </div>

    <!-- Game Page -->
    <div id="game">
        <div id="sticky-header">
            <header>
                <button id="back-btn">← Back</button>
                <h2 id="gen-title">Generation I</h2>
                <span id="active-count"></span>
                <button id="reset-btn">Reset all</button>
            </header>
            <div id="filters-bar">
                <div id="filters-strip">
                    <span id="filters-strip-label">Filters</span>
                    <button id="toggle-filters" class="toggle-filters-btn">▲ Hide</button>
                </div>
                <div id="filters-content">
                    <div class="filter-group">
                        <span class="filter-label">Filter by type:</span>
                        <div id="type-filters" class="filter-options"></div>
                    </div>
                    <div class="filter-group">
                        <span class="filter-label">Filter by evolutions:</span>
                        <div id="evo-filters" class="filter-options"></div>
                    </div>
                    <div class="filter-group">
                        <span class="filter-label">Number of types:</span>
                        <div id="typing-filters" class="filter-options"></div>
                    </div>
                    <div class="filter-group">
                        <span class="filter-label">Weak to:</span>
                        <div id="weak-filters" class="filter-options"></div>
                    </div>
                    <div class="filter-group">
                        <span class="filter-label">Resists:</span>
                        <div id="resist-filters" class="filter-options"></div>
                    </div>
                </div>
                <div id="filter-actions">
                    <button id="show-active-only" class="filter-action-btn">Only active</button>
                    <span id="filter-match-count"></span>
                    <button id="deactivate-filtered" class="filter-action-btn" disabled>Deactivate shown</button>
                    <button id="activate-filtered" class="filter-action-btn" disabled>Activate shown</button>
                    <button id="deactivate-others" class="filter-action-btn filter-danger-btn" disabled>Deactivate
                        others</button>
                    <button id="clear-filters" class="filter-action-btn secondary" disabled>Clear filters</button>
                </div>
            </div>
        </div>
        <div id="pokemon-grid"></div>
    </div>

    <!-- Info Modal -->
    <div id="modal-overlay">
        <div id="info-modal">
            <button id="modal-close">×</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
